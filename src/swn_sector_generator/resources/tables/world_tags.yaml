- id: 1
  name: Abandoned Colony
  description: >-
    The world once hosted a colony, whether human or otherwise, until some crisis
    or natural disaster drove the inhabitants away or killed them off. The colony
    might have been mercantile in nature, an expedition to extract valuable local
    resources, or it might have been a reclusive cabal of zealots. The remains of
    the colony are usually in ruins, and might still be dangerous from the aftermath
    of whatever destroyed it in the first place.
  enemies:
    - Crazed survivors
    - Ruthless plunderers of the ruins
    - Automated defense system
  friends:
    - Inquisitive stellar archeologist
    - Heir to the colony's property
    - Local wanting the place cleaned out and made safe
  complications:
    - The local government wants the ruins to remain a secret
    - The locals claim ownership of it
    - The colony is crumbling and dangerous to navigate
  things:
    - Long-lost property deeds
    - Relic stolen by the colonists when they left
    - Historical record of the colonisation attempt
  places:
    - Decaying habitation block
    - Vine-covered town square
    - Structure buried by an ancient landslide

- id: 2
  name: Alien Ruins
  description: >-
    The world has significant alien ruins present. The locals may or may not permit
    others to investigate the ruins, and may make it difficult to remove any objects
    of value without substantial payment. Any surviving ruins with worthwhile salvage
    almost certainly have some defense or hazard to explain their unplundered state.
  enemies:
    - Customs inspector
    - Worshipper of the ruins
    - Hidden alien survivor
  friends:
    - Curious scholar
    - Avaricious local resident
    - Interstellar smuggler
  complications:
    - Traps in the ruins
    - Remote location
    - Paranoid customs official
  things:
    - Precious alien artifacts
    - Objects left with the remains of a prior unsuccessful expedition
    - Untranslated alien texts
    - Untouched hidden ruins
  places:
    - Undersea ruin
    - Orbital ruin
    - Perfectly preserved alien building
    - Alien mausoleum

